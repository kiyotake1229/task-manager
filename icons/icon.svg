<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="360" x2="432" y2="360" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <line x1="80" y1="290" x2="432" y2="290" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Bar 1 (left) -->
  <rect x="100" y="300" width="72" height="62" rx="10" fill="url(#bar1)" opacity="0.5"/>

  <!-- Bar 2 (mid) -->
  <rect x="220" y="240" width="72" height="122" rx="10" fill="url(#bar2)" opacity="0.75"/>

  <!-- Bar 3 (right) -->
  <rect x="340" y="160" width="72" height="202" rx="10" fill="url(#bar3)"/>

  <!-- Trend line with glow -->
  <polyline points="136,280 256,218 376,148"
    fill="none" stroke="#22c55e" stroke-width="7"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)" opacity="0.9"/>

  <!-- Arrow head -->
  <polygon points="376,148 358,158 366,172" fill="#22c55e" opacity="0.9"/>

  <!-- Circle at end of line -->
  <circle cx="376" cy="148" r="12" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="376" cy="148" r="6" fill="white"/>

  <!-- STRIDE text -->
  <text x="256" y="450" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="52" font-weight="800" letter-spacing="8"
    fill="white" opacity="0.85">STRIDE</text>
</svg>
